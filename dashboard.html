<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  <!--css-->
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="./responsive.css">
    <!-- Google Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!--font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<!----NavBar---->
  <nav class="navbar">
    <div class="logo">
      <img src="assets/github-logo.png" alt="GitHub Logo" />
      <span>GitHub Issues Tracker</span>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍Search issues..." />
      <button id="newissueBtn"><i class="fa-solid fa-plus"></i> New Issue</button>
    </div>
  </nav>

  <!----Filter Tabs---->
  <div class="tabs">
    <button class="tab active" data-tab="all">All</button>
    <button class="tab" data-tab="open">Open</button>
    <button class="tab" data-tab="closed">Closed</button>
  </div>

<!----Issues Header---->
  <div class="issues-header">
    <div class="issues-left">
      <div class="issue-icon-box">
        <img src="assets/Aperture.png" alt="Issues Icon" />
      </div>
      <div>
        <h3><span id="issueCount">0</span> Issues</h3>
        <p>Track and manage your project issues</p>
      </div>
    </div>

    <div class="issues-right">
      <span class="legend">
        <span class="dot open-dot"></span> Open
      </span>
      <span class="legend">
        <span class="dot closed-dot"></span> Closed
      </span>
    </div>
  </div>

<!----Issue Cards Grid---->
  <div id="issueList" class="issue-list"></div>

  <script src="dashboard.js"></script>


</body>
</html>
